name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master'
      }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Reutiliza el dist ya generado por el job build del CI
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-workspace
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble Pages site
        shell: bash
        run: |
          set -euo pipefail

          find_output_dir() {
            local app="$1"
            local candidates=(
              "dist/apps/${app}/browser"
              "dist/apps/${app}"
              "dist/${app}/browser"
              "dist/${app}"
            )

            for candidate in "${candidates[@]}"; do
              if [[ -f "${candidate}/index.html" ]]; then
                echo "${candidate}"
                return 0
              fi
            done

            echo "Could not find build output for ${app}. Expected an index.html in one of: ${candidates[*]}" >&2
            return 1
          }

          SHOP_DIST="$(find_output_dir shop-web)"
          ADMIN_DIST="$(find_output_dir admin-panel)"

          rm -rf site
          mkdir -p site/admin

          cp -a "${SHOP_DIST}/." site/
          cp -a "${ADMIN_DIST}/." site/admin/

          cp site/index.html site/404.html
          cp site/admin/index.html site/admin/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
